name: Release Obsidian Plugin

# Triggered when you push a version tag (e.g. `git tag 0.2.3 && git push --tags`).
# Obsidian's plugin store expects the tag to match the version in manifest.json.
on:
  push:
    tags:
      - "*"

permissions:
  contents: write       # create / update the GitHub release
  id-token: write       # required by attest-build-provenance (OIDC)
  attestations: write   # write the attestation to the repo's attestation log

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build plugin
        run: npm run build

      - name: Verify build artifacts exist
        run: |
          test -f main.js     || (echo "main.js missing"     && exit 1)
          test -f styles.css  || (echo "styles.css missing"  && exit 1)
          test -f manifest.json || (echo "manifest.json missing" && exit 1)

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            main.js
            styles.css

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          # Use the tag name as the release name (Obsidian convention).
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          # Auto-generate release notes from commits/PRs since the last tag.
          # Override or supplement by adding `body:` or `body_path:` here.
          generate_release_notes: true
          # manifest.json must be attached for Obsidian's plugin updater.
          files: |
            main.js
            styles.css
            manifest.json
